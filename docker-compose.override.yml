networks:
  elwarknetwork:
    name: elwark_network
    external: true

services:
  people.api:
    container_name: "elwark_people_api"
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
      - Kestrel__EndPoints__Http__Url=http://+:80
      - Kestrel__EndPoints__Grpc__Url=http://+:81
      - Authentication__Authority=http://elwark_identity_api
      - Authentication__Audience=people-api
      - Notification__Host=http://elwark_notification_api
      - ConnectionStrings__Postgresql=Host=postgresql;Database=elwark_people;Username=master_account;Password=master_password
    ports:
      - "5001:80"
      - "5002:81"
    networks:
      - elwarknetwork

  people.worker:
    container_name: "elwark_people_worker"
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
      - ConnectionStrings__Postgresql=Host=postgresql;Database=elwark_people;Username=master_account;Password=master_password
      - Notification__Host=http://elwark_notification_api
    networks:
      - elwarknetwork
