name: people

on:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/people.yml'
      - 'coverage.runsettings'
  pull_request:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/people.yml'
      - 'coverage.runsettings'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docker-images:
    name: Build Docker / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: src/People.Api/Dockerfile
            tag: elwark/people-api:ci
          - name: worker
            dockerfile: src/People.Worker/Dockerfile
            tag: elwark/people-worker:ci
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_RETENTION_DAYS: 1
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.tag }}
          outputs: type=docker,dest=/tmp/people-${{ matrix.name }}.tar
          cache-from: type=gha,scope=people-${{ matrix.name }}
          cache-to: type=gha,scope=people-${{ matrix.name }},mode=max

      - name: Upload ${{ matrix.name }} image artifact
        uses: actions/upload-artifact@v6
        with:
          name: docker-image-${{ matrix.name }}
          path: /tmp/people-${{ matrix.name }}.tar
          if-no-files-found: error
          retention-days: 1

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      NUGET_XMLDOC_MODE: skip
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build
        run: dotnet build Elwark.People.slnx --configuration Release --verbosity minimal

      - name: Test
        run: dotnet test tests/Unit/Unit.Api.Tests/Unit.Api.Tests.csproj --configuration Release --no-build --no-restore --verbosity minimal --collect:"XPlat Code Coverage" --settings coverage.runsettings --results-directory TestResults

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage-unit
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 1

  api-integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      NUGET_XMLDOC_MODE: skip
      Serilog__MinimumLevel__Default: Warning
      Serilog__MinimumLevel__Override__Microsoft: Warning
      Serilog__MinimumLevel__Override__Microsoft.Hosting: Information
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build
        run: dotnet build Elwark.People.slnx --configuration Release --verbosity minimal

      - name: Test
        run: dotnet test tests/Integration/Integration.Api.Tests/Integration.Api.Tests.csproj --configuration Release --no-build --no-restore --verbosity minimal --collect:"XPlat Code Coverage" --settings coverage.runsettings --results-directory TestResults

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage-api-integration
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 1

  worker-integration-tests:
    name: Worker Integration Tests
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
      NUGET_XMLDOC_MODE: skip
      Serilog__MinimumLevel__Default: Warning
      Serilog__MinimumLevel__Override__Microsoft: Warning
      Serilog__MinimumLevel__Override__Microsoft.Hosting: Information
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build
        run: dotnet build Elwark.People.slnx --configuration Release --verbosity minimal

      - name: Test
        run: dotnet test tests/Integration/Integration.Worker.Tests/Integration.Worker.Tests.csproj --configuration Release --no-build --no-restore --verbosity minimal --collect:"XPlat Code Coverage" --settings coverage.runsettings --results-directory TestResults

      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage-worker-integration
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 1

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [ build-docker-images, unit-tests, api-integration-tests, worker-integration-tests ]
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: elwark_people
          POSTGRES_USER: master_account
          POSTGRES_PASSWORD: master_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U master_account -d elwark_people"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Download API image
        uses: actions/download-artifact@v8
        with:
          name: docker-image-api
          path: /tmp/docker-images/api

      - name: Download worker image
        uses: actions/download-artifact@v8
        with:
          name: docker-image-worker
          path: /tmp/docker-images/worker

      - name: Load images
        run: |
          docker load --input /tmp/docker-images/api/people-api.tar
          docker load --input /tmp/docker-images/worker/people-worker.tar

      - name: Start API container
        run: |
          docker run -d --name people-api-smoke \
            -p 8080:8080 \
            --add-host host.docker.internal:host-gateway \
            -e Kestrel__Endpoints__Http__Url=http://0.0.0.0:8080 \
            -e ConnectionStrings__Postgresql='Host=host.docker.internal;Port=5432;Database=elwark_people;Username=master_account;Password=master_password' \
            elwark/people-api:ci

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8080/health/live >/dev/null && \
               curl --fail --silent http://127.0.0.1:8080/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs people-api-smoke
          exit 1

      - name: Start worker container
        run: |
          docker run -d --name people-worker-smoke \
            -p 8081:8081 \
            --add-host host.docker.internal:host-gateway \
            -e Kestrel__Endpoints__Http__Url=http://0.0.0.0:8081 \
            -e ConnectionStrings__Postgresql='Host=host.docker.internal;Port=5432;Database=elwark_people;Username=master_account;Password=master_password' \
            elwark/people-worker:ci

      - name: Wait for worker health
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8081/health/live >/dev/null && \
               curl --fail --silent http://127.0.0.1:8081/health/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs people-worker-smoke
          exit 1

      - name: Cleanup smoke containers
        if: always()
        run: docker rm -f people-api-smoke people-worker-smoke || true

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [ unit-tests, api-integration-tests, worker-integration-tests ]
    if: ${{ !cancelled() }}
    permissions:
      actions: write
    steps:
      - name: Download coverage results
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage-results
          merge-multiple: true

      - name: ReportGenerator
        if: hashFiles('coverage-results/**/coverage.cobertura.xml') != ''
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.4
        with:
          reports: coverage-results/**/coverage.cobertura.xml
          targetdir: coverage-report
          reporttypes: HtmlInline;MarkdownSummaryGithub;Cobertura
          assemblyfilters: -[Unit.Api.Tests]*;-[Integration.Api.Tests]*;-[Integration.Worker.Tests]*
          verbosity: Warning

      - name: Add coverage summary to job
        if: hashFiles('coverage-results/**/coverage.cobertura.xml') != ''
        run: cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML report
        if: hashFiles('coverage-results/**/coverage.cobertura.xml') != ''
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 1

      - name: Delete coverage artifacts
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh api "repos/$GH_REPO/actions/runs/$RUN_ID/artifacts" --paginate --jq '.artifacts[] | select(.name == "coverage-unit" or .name == "coverage-api-integration" or .name == "coverage-worker-integration") | .id' \
            | xargs -r -I{} gh api --method DELETE "repos/$GH_REPO/actions/artifacts/{}"
