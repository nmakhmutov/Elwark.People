name: people

on:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/people.yml'
      - 'coverage.runsettings'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit:
    name: Unit Tests / ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - Unit.Api.Tests

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build backend
        env:
          DOTNET_NOLOGO: true
          NUGET_XMLDOC_MODE: skip
        run: dotnet build Elwark.People.slnx --configuration Release --verbosity minimal

      - name: Run ${{ matrix.project }}
        run: dotnet test tests/Unit/${{ matrix.project }}/${{ matrix.project }}.csproj --configuration Release --no-build --no-restore --verbosity minimal --collect:"XPlat Code Coverage" --settings coverage.runsettings --results-directory TestResults

      - name: Upload coverage
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: coverage-unit-${{ matrix.project }}
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: error
          retention-days: 1

  backend-integration:
    name: Integration Tests / ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - Integration.Api.Tests
          - Integration.Worker.Tests
    env:
      Serilog__MinimumLevel__Default: Warning
      Serilog__MinimumLevel__Override__Microsoft: Warning
      Serilog__MinimumLevel__Override__Microsoft.Hosting: Information

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build backend
        env:
          DOTNET_NOLOGO: true
          NUGET_XMLDOC_MODE: skip
        run: dotnet build Elwark.People.slnx --configuration Release --verbosity minimal

      - name: Run ${{ matrix.project }}
        run: dotnet test tests/Integration/${{ matrix.project }}/${{ matrix.project }}.csproj --configuration Release --no-build --no-restore --verbosity minimal --collect:"XPlat Code Coverage" --settings coverage.runsettings --results-directory TestResults

      - name: Upload coverage
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: coverage-integration-${{ matrix.project }}
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: ignore
          retention-days: 1

  backend-coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [ backend-unit, backend-integration ]
    if: ${{ !cancelled() }}

    steps:
      - name: Download coverage results
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          path: coverage-results
          merge-multiple: true

      - name: ReportGenerator
        if: hashFiles('coverage-results/**/coverage.cobertura.xml') != ''
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.4
        with:
          reports: coverage-results/**/coverage.cobertura.xml
          targetdir: coverage-report
          reporttypes: HtmlInline;MarkdownSummaryGithub;Cobertura
          assemblyfilters: -[Unit.Api.Tests]*;-[Integration.Api.Tests]*;-[Integration.Worker.Tests]*;-[Integration.Shared.Tests]*
          verbosity: Warning

      - name: Add coverage summary to job
        if: hashFiles('coverage-results/**/coverage.cobertura.xml') != ''
        run: cat coverage-report/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload HTML report
        continue-on-error: true
        if: hashFiles('coverage-results/**/coverage.cobertura.xml') != ''
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 1

  backend-smoke-tests:
    name: Backend Docker Build and Smoke Tests
    needs: [ backend-unit, backend-integration ]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: master_account
          POSTGRES_PASSWORD: master_password
          POSTGRES_DB: elwark_people
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U master_account -d elwark_people"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and export API image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: src/People.Api/Dockerfile
          tags: elwark/people-api:ci
          outputs: type=docker,dest=/tmp/people-api.tar
          cache-from: type=gha,scope=people-api
          cache-to: type=gha,scope=people-api,mode=max

      - name: Build and export Worker image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: src/People.Worker/Dockerfile
          tags: elwark/people-worker:ci
          outputs: type=docker,dest=/tmp/people-worker.tar
          cache-from: type=gha,scope=people-worker
          cache-to: type=gha,scope=people-worker,mode=max

      - name: Load images
        run: |
          docker load -i /tmp/people-api.tar
          docker load -i /tmp/people-worker.tar

      - name: Smoke test API container
        run: |
          set -euo pipefail

          docker run -d --rm --name people-api-smoke -p 8080:8080 \
            --add-host=host.docker.internal:host-gateway \
            -e Kestrel__Endpoints__Http__Url=http://0.0.0.0:8080 \
            -e ConnectionStrings__Postgresql="Host=host.docker.internal;Port=5432;Database=elwark_people;Username=master_account;Password=master_password" \
            elwark/people-api:ci

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/health/live > /dev/null && curl -fsS http://127.0.0.1:8080/health/ready > /dev/null; then
              break
            fi

            if ! docker ps --format '{{.Names}}' | grep -q '^people-api-smoke$'; then
              echo "API container exited. Logs:"
              docker logs people-api-smoke || true
              exit 1
            fi

            sleep 2

            if [ "$i" -eq 30 ]; then
              echo "Health check timed out. Logs:"
              docker logs people-api-smoke || true
              exit 1
            fi
          done

      - name: Smoke test Worker container
        run: |
          set -euo pipefail

          docker run -d --rm --name people-worker-smoke -p 8081:8081 \
            --add-host=host.docker.internal:host-gateway \
            -e Kestrel__Endpoints__Http__Url=http://0.0.0.0:8081 \
            -e ConnectionStrings__Postgresql="Host=host.docker.internal;Port=5432;Database=elwark_people;Username=master_account;Password=master_password" \
            elwark/people-worker:ci

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8081/health/live > /dev/null && curl -fsS http://127.0.0.1:8081/health/ready > /dev/null; then
              break
            fi

            if ! docker ps --format '{{.Names}}' | grep -q '^people-worker-smoke$'; then
              echo "Worker container exited. Logs:"
              docker logs people-worker-smoke || true
              exit 1
            fi

            sleep 2

            if [ "$i" -eq 30 ]; then
              echo "Health check timed out. Logs:"
              docker logs people-worker-smoke || true
              exit 1
            fi
          done

      - name: Cleanup smoke containers
        if: always()
        run: docker rm -f people-api-smoke people-worker-smoke || true
