name: cleanup

on:
  push:
  pull_request:
    types: [ closed ]
  delete:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  cleanup-pr-caches:
    name: Delete PR Caches
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete caches for PR branch
        run: |
          set -euo pipefail

          BRANCH=${{ github.event.pull_request.head.ref }}
          OUTPUT=""

          if ! OUTPUT=$(gh cache delete --all --ref "$BRANCH" 2>&1); then
            echo "$OUTPUT"

            if grep -q "No caches to delete" <<<"$OUTPUT"; then
              exit 0
            fi

            exit 1
          fi

          echo "$OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  cleanup-pr-workflow-runs:
    name: Delete PR Workflow Runs
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete completed workflow runs for PR branch
        run: |
          BRANCH=${{ github.event.pull_request.head.ref }}
          echo "Deleting completed workflow runs for $BRANCH"

          gh api -X GET repos/$GH_REPO/actions/runs --paginate --jq ".workflow_runs[] | select(.status == \"completed\" and .head_branch == \"$BRANCH\") | .id" \
            | xargs -r -I{} gh api -X DELETE repos/$GH_REPO/actions/runs/{}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  cleanup-branch-caches:
    name: Delete Branch Caches
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete caches for deleted branch
        run: |
          set -euo pipefail

          BRANCH=${{ github.event.ref }}
          OUTPUT=""

          if ! OUTPUT=$(gh cache delete --all --ref "$BRANCH" 2>&1); then
            echo "$OUTPUT"

            if grep -q "No caches to delete" <<<"$OUTPUT"; then
              exit 0
            fi

            exit 1
          fi

          echo "$OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  cleanup-branch-workflow-runs:
    name: Delete Branch Workflow Runs
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete completed workflow runs for deleted branch
        run: |
          BRANCH=${{ github.event.ref }}
          echo "Deleting completed workflow runs for $BRANCH"

          gh api -X GET repos/$GH_REPO/actions/runs --paginate --jq ".workflow_runs[] | select(.status == \"completed\" and .head_branch == \"$BRANCH\") | .id" \
            | xargs -r -I{} gh api -X DELETE repos/$GH_REPO/actions/runs/{}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  cleanup-stale-caches:
    name: Delete Stale Caches
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete caches older than 1 day
        run: |
          CUTOFF=$(date -u -d '1 day ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Deleting caches created before $CUTOFF"

          gh api -X GET repos/$GH_REPO/actions/caches --paginate --jq ".actions_caches[] | select(.created_at < \"$CUTOFF\") | .id" \
            | xargs -r -I{} gh api -X DELETE repos/$GH_REPO/actions/caches/{}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  cleanup-stale-artifacts:
    name: Delete Stale Artifacts
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete artifacts older than 1 day
        run: |
          CUTOFF=$(date -u -d '1 day ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Deleting artifacts created before $CUTOFF"

          gh api -X GET repos/$GH_REPO/actions/artifacts --paginate --jq ".artifacts[] | select(.created_at < \"$CUTOFF\") | .id" \
            | xargs -r -I{} gh api -X DELETE repos/$GH_REPO/actions/artifacts/{}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  cleanup-workflow-runs:
    name: Delete Old Workflow Runs
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete completed workflow runs older than 7 days
        run: |
          set -euo pipefail

          CUTOFF=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Deleting completed workflow runs created before $CUTOFF"

          gh api -X GET repos/$GH_REPO/actions/runs --paginate --jq ".workflow_runs[] | select(.status == \"completed\" and .created_at < \"$CUTOFF\") | .id" \
            | xargs -r -I{} gh api -X DELETE repos/$GH_REPO/actions/runs/{}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
